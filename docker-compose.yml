version: '3.8'

services:
  # 1. Primary Database - PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: dataagent-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: organization_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql # auto-seeds on first launch
    restart: always

  # 2. Python Microservice - AI & Math Engine
  analytics:
    build: ./analytics
    container_name: dataagent-analytics
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: always

  # 3. Backend REST API - Express.js
  backend:
    build: ./backend
    container_name: dataagent-backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/organization_analytics
      ANALYTICS_SERVICE_URL: http://analytics:8000
      JWT_SECRET: ${JWT_SECRET:-super_secret_key_change_me_in_production}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - db
      - analytics
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always

  # 4. Frontend Web App - React/Nginx
  frontend:
    build: ./frontend
    container_name: dataagent-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
